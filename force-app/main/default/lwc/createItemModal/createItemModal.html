<template>
  <section
    role="dialog"
    tabindex="-1"
    aria-modal="true"
    aria-labelledby="modal-heading-create"
    class="slds-modal slds-fade-in-open"
  >
    <div class="slds-modal__container">
      <header class="slds-modal__header">
        <button
          class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
          onclick={handleClose}
          title="Close"
        >
          <lightning-icon
            icon-name="utility:close"
            size="small"
          ></lightning-icon>
          <span class="slds-assistive-text">Close</span>
        </button>
        <h2 id="modal-heading-create" class="slds-modal__title slds-hyphenate">
          Create New Item
        </h2>
      </header>
      <div
        class="slds-modal__content slds-p-around_medium"
        id="modal-content-create"
      >
        <template if:true={isLoading}>
          <lightning-spinner
            alternative-text="Saving..."
            size="medium"
          ></lightning-spinner>
        </template>
        <lightning-input
          label="Name"
          value={name}
          onchange={handleNameChange}
          required
        >
        </lightning-input>
        <lightning-textarea
          label="Description"
          value={description}
          onchange={handleDescriptionChange}
          class="slds-m-top_small"
        >
        </lightning-textarea>
        <lightning-combobox
          label="Type"
          value={selectedType}
          options={typeOptions}
          onchange={handleTypeChange}
          required
          class="slds-m-top_small"
        >
        </lightning-combobox>
        <lightning-combobox
          label="Family"
          value={selectedFamily}
          options={familyOptions}
          onchange={handleFamilyChange}
          required
          class="slds-m-top_small"
        >
        </lightning-combobox>
        <lightning-input
          label="Price"
          type="number"
          value={price}
          onchange={handlePriceChange}
          formatter="currency"
          required
          class="slds-m-top_small"
        >
        </lightning-input>
      </div>
      <footer class="slds-modal__footer">
        <lightning-button
          label="Cancel"
          variant="neutral"
          onclick={handleClose}
        ></lightning-button>
        <lightning-button
          label="Save"
          variant="brand"
          onclick={handleSave}
          disabled={isSaveDisabled}
        >
        </lightning-button>
      </footer>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>
